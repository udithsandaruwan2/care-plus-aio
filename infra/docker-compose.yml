name: care-plus

# Lean-profile infrastructure. One database image (TimescaleDB-HA) bundles
# PostgreSQL + PostGIS + TimescaleDB, and one Redis for cache/lock/broker/channels.
# Backend + worker services are added in Step 3.

services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: careplus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careplus}
      POSTGRES_USER: ${POSTGRES_USER:-careplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careplus}
    ports:
      # Host port is decoupled from the internal port to avoid clashing with a
      # local PostgreSQL on 5432. Backend containers still connect to db:5432.
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-careplus} -d ${POSTGRES_DB:-careplus}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: careplus-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ../backend
    container_name: careplus-backend
    restart: unless-stopped
    command:
      ['uvicorn', 'careplus.asgi:application', '--host', '0.0.0.0', '--port', '8000', '--reload']
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/api/v1/health/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ../backend
    container_name: careplus-worker
    restart: unless-stopped
    command: ['celery', '-A', 'careplus', 'worker', '-l', 'info']
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
